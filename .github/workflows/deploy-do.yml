name: Deploy to DO App Platform

# Triggered after publish-image.yml succeeds on a tag push, OR manually.
#
# Required repo secrets:
#   DIGITALOCEAN_ACCESS_TOKEN — Personal Access Token with read+write on apps
#   DIGITALOCEAN_APP_ID       — UUID of the nexdoz-web app on DO
on:
  workflow_run:
    workflows: ["Publish image to ghcr.io"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to deploy (e.g. v0.3.4 or latest)"
        required: true
        default: "latest"

permissions:
  contents: read

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://app.nexdoz.com
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.event.workflow_run.head_branch }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Render app spec with resolved tag
        run: |
          sed -i "s|tag: latest|tag: ${{ steps.tag.outputs.tag }}|" .do/app.yaml
          cat .do/app.yaml | head -25

      - name: Apply spec to App Platform
        run: |
          doctl apps update "${{ secrets.DIGITALOCEAN_APP_ID }}" \
            --spec .do/app.yaml \
            --wait

      - name: Smoke test
        run: |
          for i in 1 2 3 4 5; do
            if curl -fsS -o /dev/null -w '%{http_code}' https://app.nexdoz.com/api/health | grep -q '^200$'; then
              echo "health OK"
              exit 0
            fi
            echo "poll $i: not ready"
            sleep 15
          done
          echo "smoke test failed"
          exit 1
