version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "05:00"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 5
    versioning-strategy: "increase"
    groups:
      npm-all:
        patterns:
          - "*"
        exclude-patterns:
          - "@next-trace/*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "05:00"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 3
    groups:
      actions-all:
        patterns:
          - "*"
